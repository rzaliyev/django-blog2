<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock title %}</title>
    
    <!-- Tailwind CSS for development -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen">
    
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
      <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">📝 My Blog</a>
        <div class="space-x-4 text-sm text-grey-600">
          <a href="/" class="hover:text-indigo-600">Home</a>
          <a href="#" class="hover:text-indigo-600">About</a>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-4xl mx-auto px-4 py-10">
      {% block content %}{% endblock content %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-sm text-gray-400 py-6 border-t mt-10">
      Built with Django + Tailwind
    </footer>

  </body>
</html>
